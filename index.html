<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Gianni Connect 📅</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #6366f1;
      --bg-gradient: linear-gradient(135deg, #a5b4fc 0%, #818cf8 100%);
    }

    body { 
      font-family: 'Poppins', sans-serif; margin: 0; min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      background: var(--bg-gradient);
    }

    .container {
      background: rgba(255, 255, 255, 0.95);
      padding: 30px; border-radius: 24px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.1);
      text-align: center; width: 100%; max-width: 420px;
    }

    /* Statuts en un clic */
    .status-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px;
    }

    .status-btn {
      padding: 12px; border-radius: 12px; border: 2px solid transparent;
      background: #f3f4f6; cursor: pointer; font-weight: 600;
      transition: all 0.2s; font-size: 14px;
    }

    .status-btn:hover { background: #e5e7eb; transform: translateY(-2px); }
    .status-btn.active { border-color: var(--primary); background: #e0e7ff; color: var(--primary); }

    /* Inputs & Buttons */
    input { 
      width: 100%; margin: 8px 0; padding: 12px; border-radius: 12px;
      border: 1px solid #ddd; box-sizing: border-box;
    }

    .btn-main {
      width: 100%; padding: 12px; border-radius: 12px; border: none;
      background: var(--primary); color: white; font-weight: 600;
      cursor: pointer; margin-top: 10px;
    }

    .invitation-box {
      margin-top: 25px; padding-top: 20px; border-top: 1px solid #eee;
    }

    #status-display {
      font-size: 24px; font-weight: 800; margin: 15px 0; color: #1f2937;
    }

    .hidden { display: none; }
    
    .copy-link {
      font-size: 11px; background: #f9fafb; padding: 8px;
      border-radius: 8px; word-break: break-all; margin-top: 10px;
      border: 1px dashed #ccc; cursor: pointer;
    }
  </style>
</head>
<body>

  <div class="container">
    <h2 id="main-title">👋 Bienvenue</h2>

    <div id="section-loading">Vérification...</div>

    <div id="section-login" class="hidden">
      <input id="login-user" type="text" placeholder="👤 Nom d'utilisateur">
      <input id="login-pass" type="password" placeholder="🔑 Mot de passe">
      <button class="btn-main" id="btn-do-login">Se connecter</button>
    </div>

    <div id="section-register" class="hidden">
      <p>✨ Créer votre compte invité</p>
      <input id="reg-user" type="text" placeholder="👤 Choisir un nom">
      <input id="reg-pass" type="password" placeholder="🔑 Mot de passe">
      <button class="btn-main" id="btn-do-register">Créer mon compte</button>
    </div>

    <div id="section-dash" class="hidden">
      <p>Statut actuel :</p>
      <div id="status-display">🟢 Disponible</div>

      <div class="status-grid">
        <div class="status-btn" onclick="updateStatus('disponible')">🟢 Dispo</div>
        <div class="status-btn" onclick="updateStatus('occupe')">🟡 Occupé</div>
        <div class="status-btn" onclick="updateStatus('reunion')">📅 Réunion</div>
        <div class="status-btn" onclick="updateStatus('pause')">☕ Pause</div>
        <div class="status-btn" onclick="updateStatus('indisponible')">🔴 Off</div>
      </div>

      <div id="admin-zone" class="hidden invitation-box">
        <p style="font-size: 13px; color: #666;">🛠️ Zone Admin</p>
        <button class="btn-main" style="background:#10b981" id="btn-gen-link">Générer un lien d'invitation</button>
        <div id="display-link" class="hidden copy-link"></div>
      </div>

      <button onclick="logout()" style="background:#ef4444; margin-top:30px" class="btn-main">Déconnexion</button>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
    import { getFirestore, doc, getDoc, setDoc, deleteDoc, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCpU7734RfZ0apwm5zOTTik1xs5KRZYplg",
      authDomain: "zami-e32a7.firebaseapp.com",
      projectId: "zami-e32a7",
      storageBucket: "zami-e32a7.appspot.com",
      messagingSenderId: "123456789012",
      appId: "1:123456789012:web:xxxxxxxxxx"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const statusMap = {
      "disponible": "🟢 Disponible",
      "occupe": "🟡 Occupé",
      "reunion": "📅 En réunion",
      "pause": "☕ En pause",
      "indisponible": "🔴 Indisponible"
    };

    // --- LOGIQUE AU CHARGEMENT ---
    window.onload = async () => {
      const hash = window.location.hash.substring(1);
      
      if (hash) {
        // Mode création de compte via lien
        const invRef = doc(db, "invitations", hash);
        const invSnap = await getDoc(invRef);
        
        if (invSnap.exists()) {
          showSection('section-register');
          document.getElementById('main-title').innerText = "🎁 Invitation Valide";
        } else {
          alert("Lien expiré ou invalide.");
          window.location.hash = "";
          location.reload();
        }
      } else {
        checkAutoLogin();
      }
    };

    async function checkAutoLogin() {
      const user = localStorage.getItem("user");
      if (user) showDashboard(user);
      else showSection('section-login');
    }

    // --- ACTIONS ---

    // Connexion
    document.getElementById('btn-do-login').onclick = async () => {
      const u = document.getElementById('login-user').value.toLowerCase();
      const p = document.getElementById('login-pass').value;
      const uDoc = await getDoc(doc(db, "users", u));
      
      if (uDoc.exists() && uDoc.data().password === p) {
        localStorage.setItem("user", u);
        showDashboard(u);
      } else alert("Erreur identifiants");
    };

    // Création de compte (via invitation)
    document.getElementById('btn-do-register').onclick = async () => {
      const hash = window.location.hash.substring(1);
      const u = document.getElementById('reg-user').value.toLowerCase().trim();
      const p = document.getElementById('reg-pass').value;

      if (!u || p.length < 4) return alert("Infos invalides");

      // 1. Créer user
      await setDoc(doc(db, "users", u), { password: p, role: "guest" });
      // 2. Supprimer l'invitation (Usage unique)
      await deleteDoc(doc(db, "invitations", hash));
      
      alert("Compte créé ! Connectez-vous.");
      window.location.hash = "";
      location.reload();
    };

    // Mise à jour Statut (Un clic)
    window.updateStatus = async (s) => {
      await setDoc(doc(db, "availability", "Gianni"), { Gianni: s });
      document.getElementById('status-display').innerText = statusMap[s];
      refreshActiveBtn(s);
    };

    // Générer un lien d'invitation (Seul Gianni peut le voir)
    document.getElementById('btn-gen-link').onclick = async () => {
      const idUnique = Math.random().toString(36).substring(2, 15);
      await setDoc(doc(db, "invitations", idUnique), { createdBy: "gianni" });
      
      const link = window.location.origin + window.location.pathname + "#" + idUnique;
      const box = document.getElementById('display-link');
      box.innerText = link;
      box.classList.remove('hidden');
      alert("Lien généré ! Cliquez sur le cadre gris pour copier.");
    };

    // --- UI HELPERS ---
    function showSection(id) {
      document.querySelectorAll('.container > div').forEach(d => d.classList.add('hidden'));
      document.getElementById(id).classList.remove('hidden');
    }

    async function showDashboard(user) {
      showSection('section-dash');
      document.getElementById('main-title').innerText = "Salut " + user;
      if (user === "gianni") document.getElementById('admin-zone').classList.remove('hidden');
      
      const snap = await getDoc(doc(db, "availability", "Gianni"));
      const current = snap.exists() ? snap.data().Gianni : "disponible";
      document.getElementById('status-display').innerText = statusMap[current];
      refreshActiveBtn(current);
    }

    function refreshActiveBtn(s) {
      document.querySelectorAll('.status-btn').forEach(b => {
        b.classList.remove('active');
        if (b.innerText.toLowerCase().includes(s.substring(0,3))) b.classList.add('active');
      });
    }

    window.logout = () => {
      localStorage.removeItem("user");
      location.reload();
    };

    document.getElementById('display-link').onclick = function() {
      navigator.clipboard.writeText(this.innerText);
      alert("Lien copié !");
    };

  </script>
</body>
</html>
