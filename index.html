<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Disponibilité de Gianni 📅</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <style>
    /* 🌟 Décor en fond et police moderne */
    body { 
      font-family: 'Poppins', sans-serif; 
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #74ebd5 0%, #9face6 100%);
      background-size: 200% 200%;
      animation: gradientBG 10s ease infinite;
    }

    @keyframes gradientBG {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* 📦 Conteneur principal effet "Verre" */
    .container {
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(10px);
      padding: 40px 30px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.15);
      text-align: center;
      width: 100%;
      max-width: 400px;
    }

    h1 {
      font-size: 22px;
      color: #333;
      margin-bottom: 20px;
    }

    /* 🎨 Style des champs et boutons */
    input[type="text"], input[type="password"], select, button { 
      width: 90%;
      margin: 10px 0; 
      padding: 12px; 
      font-size: 16px; 
      border-radius: 10px;
      border: 1px solid #ccc;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    input:focus, select:focus {
      outline: none;
      border-color: #9face6;
      box-shadow: 0 0 5px rgba(159, 172, 230, 0.5);
    }

    /* Checkbox IP */
    .checkbox-container {
      text-align: left;
      margin: 10px 5%;
      font-size: 14px;
      color: #555;
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
    }
    
    .checkbox-container input {
      width: auto;
      margin: 0;
      cursor: pointer;
    }

    button {
      background-color: #5b73e8;
      color: white;
      border: none;
      cursor: pointer;
      font-weight: 600;
      transition: background-color 0.3s, transform 0.1s;
    }

    button:hover { background-color: #4a62d1; }
    button:active { transform: scale(0.98); }

    #logoutBtn { background-color: #ff6b6b; margin-top: 20px; }
    #logoutBtn:hover { background-color: #e55a5a; }

    /* 📊 Sections */
    #dashboard { display: none; }
    #loadingScreen { display: block; font-size: 18px; font-weight: bold; color: #333; }
    #login { display: none; }
    
    #status-box { 
      background: #f8f9fa; 
      padding: 15px; 
      border-radius: 10px;
      margin: 20px 0;
      font-size: 18px;
      border: 1px solid #e2e2e2;
    }

    #gianniStatus {
      display: block;
      font-size: 24px;
      margin-top: 10px;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>👋 Gestion de la disponibilité</h1>

    <div id="loadingScreen">
      🔍 Vérification de la connexion...
    </div>

    <div id="login">
      <p>Connectez-vous pour continuer</p>
      <input id="username" type="text" placeholder="👤 Nom d'utilisateur"><br>
      <input id="password" type="password" placeholder="🔑 Mot de passe"><br>
      
      <label class="checkbox-container">
        <input type="checkbox" id="rememberIp"> Mémoriser ma connexion via IP
      </label>

      <button id="loginBtn">🚀 Se connecter</button>
    </div>

    <div id="dashboard">
      <p>Bonjour <strong><span id="userDisplay"></span></strong> ! ✨</p>
      
      <div id="status-box">
        Disponibilité : <strong id="gianniStatus">⏳ Chargement...</strong>
      </div>

      <label for="statusSelect"><strong>Changer le statut :</strong></label>
      <select id="statusSelect">
        <option value="disponible">🟢 Disponible</option>
        <option value="indisponible">🔴 Indisponible</option>
        <option value="occupe">🟡 Occupé</option>
        <option value="pause">☕ En pause</option>
        <option value="reunion">📅 En réunion</option>
      </select>
      
      <button id="updateBtn">✅ Mettre à jour</button>
      <button id="logoutBtn">🚪 Se déconnecter</button>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
    import { getFirestore, doc, getDoc, setDoc, updateDoc, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore.js";

    // 🔑 Remplace par ta config Firebase
    const firebaseConfig = {
      apiKey: "AIzaSyCpU7734RfZ0apwm5zOTTik1xs5KRZYplg",
      authDomain: "zami-e32a7.firebaseapp.com",
      projectId: "zami-e32a7",
      storageBucket: "zami-e32a7.appspot.com",
      messagingSenderId: "123456789012",
      appId: "1:123456789012:web:xxxxxxxxxx"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const loadingScreen = document.getElementById("loadingScreen");
    const loginDiv = document.getElementById("login");
    const dashboard = document.getElementById("dashboard");
    const userDisplay = document.getElementById("userDisplay");
    const gianniStatus = document.getElementById("gianniStatus");
    const statusSelect = document.getElementById("statusSelect");
    const updateBtn = document.getElementById("updateBtn");
    const loginBtn = document.getElementById("loginBtn");
    const logoutBtn = document.getElementById("logoutBtn");

    const statusIcons = {
      "disponible": "🟢 Disponible",
      "indisponible": "🔴 Indisponible",
      "occupe": "🟡 Occupé",
      "pause": "☕ En pause",
      "reunion": "📅 En réunion"
    };

    let currentUser = null; // Stockera l'utilisateur connecté

    // 🌐 Fonction pour récupérer l'IP publique de l'utilisateur
    async function getCurrentIP() {
      try {
        const response = await fetch('https://api.ipify.org?format=json');
        const data = await response.json();
        return data.ip;
      } catch (e) {
        console.error("Impossible de récupérer l'IP", e);
        return null;
      }
    }

    // 🔄 Vérification initiale (Session locale ou IP)
    async function checkAutoLogin() {
      const savedUserLocal = localStorage.getItem("loggedInUser");
      
      if(savedUserLocal) {
        return showDashboard(savedUserLocal);
      }

      // Si pas de session locale, on vérifie l'IP dans Firebase
      const currentIp = await getCurrentIP();
      if(currentIp) {
        const usersRef = collection(db, "users");
        const q = query(usersRef, where("savedIp", "==", currentIp));
        const querySnapshot = await getDocs(q);

        if (!querySnapshot.empty) {
          // IP trouvée dans un document utilisateur ! Connexion auto.
          const userDoc = querySnapshot.docs[0];
          const username = userDoc.id;
          localStorage.setItem("loggedInUser", username);
          return showDashboard(username);
        }
      }

      // Si aucune IP ne correspond, on affiche le formulaire de connexion
      loadingScreen.style.display = "none";
      loginDiv.style.display = "block";
    }

    // Lancer la vérification au chargement
    checkAutoLogin();

    // 🚀 Connexion manuelle (Vérification dans Firebase)
    loginBtn.onclick = async () => {
      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value.trim();
      const rememberIp = document.getElementById("rememberIp").checked;

      if(!username || !password) return alert("❌ Veuillez remplir tous les champs.");

      loginBtn.textContent = "⏳ Connexion...";
      loginBtn.disabled = true;

      try {
        const userRef = doc(db, "users", username);
        const userSnap = await getDoc(userRef);

        if(userSnap.exists() && userSnap.data().password === password) {
          localStorage.setItem("loggedInUser", username);
          
          // Si l'utilisateur veut mémoriser l'IP
          if(rememberIp) {
            const currentIp = await getCurrentIP();
            if(currentIp) {
              await updateDoc(userRef, { savedIp: currentIp });
            }
          }

          showDashboard(username);
        } else {
          alert("❌ Nom d'utilisateur ou mot de passe incorrect !");
        }
      } catch (error) {
        console.error(error);
        alert("❌ Erreur de connexion au serveur.");
      }

      loginBtn.textContent = "🚀 Se connecter";
      loginBtn.disabled = false;
    };

    // 🚪 Déconnexion
    logoutBtn.onclick = async () => {
      logoutBtn.textContent = "⏳ Déconnexion...";
      
      // On supprime l'IP enregistrée dans Firebase pour empêcher la reconnexion automatique
      if(currentUser) {
        try {
          const userRef = doc(db, "users", currentUser);
          await updateDoc(userRef, { savedIp: "" }); // Efface l'IP
        } catch(e) { console.error("Erreur suppression IP", e); }
      }

      localStorage.removeItem("loggedInUser");
      currentUser = null;
      
      document.getElementById("username").value = "";
      document.getElementById("password").value = "";
      document.getElementById("rememberIp").checked = false;

      dashboard.style.display = "none";
      loginDiv.style.display = "block";
      logoutBtn.textContent = "🚪 Se déconnecter";
    };

    // 🎛️ Affiche dashboard
    async function showDashboard(username) {
      currentUser = username;
      loadingScreen.style.display = "none";
      loginDiv.style.display = "none";
      dashboard.style.display = "block";
      userDisplay.textContent = username;
      await loadGianniStatus();
    }

    // 📥 Charge ou crée la disponibilité
    async function loadGianniStatus() {
      const docRef = doc(db, "availability", "Gianni");
      const docSnap = await getDoc(docRef);
      if(docSnap.exists()) {
        const currentStatus = docSnap.data().Gianni;
        gianniStatus.textContent = statusIcons[currentStatus] || currentStatus;
        if(statusIcons[currentStatus]) statusSelect.value = currentStatus;
      } else {
        await setDoc(docRef, { Gianni: "disponible" });
        gianniStatus.textContent = statusIcons["disponible"];
        statusSelect.value = "disponible";
      }
    }

    // 📤 Change disponibilité avec le menu déroulant
    updateBtn.onclick = async () => {
      const newStatus = statusSelect.value;
      const docRef = doc(db, "availability", "Gianni");
      
      updateBtn.textContent = "⏳ Mise à jour...";
      updateBtn.disabled = true;

      await setDoc(docRef, { Gianni: newStatus }, { merge: true });
      
      gianniStatus.textContent = statusIcons[newStatus];
      updateBtn.textContent = "✅ Mettre à jour";
      updateBtn.disabled = false;
    };
  </script>
</body>
</html>
